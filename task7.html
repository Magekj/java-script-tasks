<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript Real-Time Tasks</title>

  <style>
    body{
      font-family: Arial;
      padding:20px;
      background:#f5f5f5;
    }

    h2{
      color:#333;
      margin-top:40px;
    }

    .card-container{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
    }

    .card{
      width:220px;
      background:white;
      padding:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:contain;
    }

    button{
      padding:10px 15px;
      border:none;
      background:black;
      color:white;
      cursor:pointer;
      border-radius:5px;
      margin-top:10px;
    }

    input{
      padding:10px;
      width:250px;
      margin-bottom:20px;
    }
  </style>
</head>

<body>

  <h1>JavaScript Real-Time Tasks</h1>

  <h2>20. Real API Product Table</h2>

  <input type="text" id="searchInput" placeholder="Search product..." />

  <button onclick="sortProducts()">Sort Price Low to High</button>

  <div class="card-container" id="productContainer"></div>

  <script src="script.js"></script>

</body>
</html>
